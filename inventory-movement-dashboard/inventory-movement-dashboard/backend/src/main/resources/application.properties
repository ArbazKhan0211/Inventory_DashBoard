server.port=8080

spring.application.name=inventory-movement-dashboard

# Max upload size for movement JSON files
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Where the "persisted" data file lives at runtime (created next to the jar / working dir on first write)
app.data.runtime-file=./data/movements-runtime.json
app.data.classpath-seed=data/movements.json

logging.level.com.example.inventory=INFO
